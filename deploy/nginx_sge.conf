# /etc/nginx/sites-available/sge
#
# Este archivo va en el servidor, NO en tu proyecto. Instrucciones de
# instalación completas en deploy/DEPLOYMENT.md.
#
# Qué hace: recibe TODAS las peticiones web (puerto 80/443) y:
#   - Si piden un archivo estático GENUINAMENTE público (CSS, JS, imágenes de
#     la interfaz), Nginx lo entrega DIRECTAMENTE del disco (mucho más rápido
#     que pedirle a Python/Flask que lo haga).
#   - Si piden cualquier otra cosa (una ruta de Flask, incluyendo ver un
#     documento de un alumno), se la reenvía a Gunicorn a través del socket
#     Unix -- ahí Flask sí exige sesión + rol antes de servir el archivo.
#
# SECURITY-NOTE: los documentos de alumnos (INE, CURP, actas) viven en
# instance/documentos_alumnos/, FUERA de static/, a propósito. Si alguna vez
# alguien los mueve de vuelta a static/, este alias los serviría a CUALQUIERA
# sin pasar por Flask ni por su control de rol.

server {
    listen 80;
    server_name TU_DOMINIO.com www.TU_DOMINIO.com;
    # Si todavía no tienes dominio, usa la IP del VPS aquí en su lugar,
    # ej: server_name 123.45.67.89;

    client_max_body_size 10M;
    # Debe ser >= MAX_CONTENT_LENGTH de config.py (8 MB) para que Nginx
    # no rechace la subida de documentos ANTES de que Flask la reciba.

    # --- Archivos estáticos: Nginx los sirve directo, sin pasar por Python ---
    location /static/ {
        alias /home/sge/sge_enfermeria/static/;
        expires 30d;
        access_log off;
    }

    # --- Todo lo demás: reenviar a Gunicorn ---
    location / {
        include proxy_params;
        proxy_pass http://unix:/home/sge/sge_enfermeria/sge.sock;
    }
}

# NOTA: después de correr certbot (ver DEPLOYMENT.md paso de HTTPS),
# certbot MODIFICA este archivo automáticamente para agregar el bloque
# de "listen 443 ssl" y redirigir el puerto 80 -> 443. No necesitas
# escribir eso a mano.
